# Yenileme Kayıt Defteri
#
# saas-msa-review ve vendor-agreement-review handoff'ları ile renewal-tracker
# Mode 3 taramaları tarafından doldurulur. Her kayıt bir sözleşmenin ne zaman
# yenileneceğini, fesih/yenilememe ihbarının en geç ne zaman ve hangi yöntemle
# gönderilmesi gerektiğini izler.
#
# renewal-watcher ajanı bu dosyayı haftalık okur ve yaklaşan tarihleri raporlar.

renewals: []

